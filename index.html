:root {
  --blk: #000;
  --cyn: #00ffe5;
  --mag: #ff1a4b;
  --gold: #ffaa00;
  --wht: #e0e8f0;
  --dim: #0a0e14;
  --safe-top: env(safe-area-inset-top, 54px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height:100%; overflow:hidden; background:#000; }

body {
  width:100vw; height:100vh; height:100dvh;
  background: #000;
  overflow:hidden; position:fixed; inset:0;
  font-family:'Share Tech Mono','Courier New',monospace;
  touch-action:none;
  -webkit-user-select:none; user-select:none;
}

/* ── FILM GRAIN ── */
.grain {
  position:fixed; inset:0; z-index:950; pointer-events:none;
  opacity:0.055;
  animation: grain-shift 0.12s steps(1) infinite;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
@keyframes grain-shift {
  0%  { background-position: 0 0; }
  10% { background-position: -5% -10%; }
  20% { background-position: -15% 5%; }
  30% { background-position: 7% -25%; }
  40% { background-position: -5% 25%; }
  50% { background-position: -15% 10%; }
  60% { background-position: 15% 0%; }
  70% { background-position: 0 15%; }
  80% { background-position: 3% 35%; }
  90% { background-position: -10% 10%; }
  100%{ background-position: 0 0; }
}

/* ── CINEMATIC LETTERBOX ── */
.letterbox-top, .letterbox-bot {
  position:fixed; left:0; right:0; z-index:940; pointer-events:none;
  height: 52px;
  background: #000;
}
.letterbox-top { top:0; }
.letterbox-bot { bottom:0; }

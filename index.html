<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CYBER.ISLAND">
<meta name="theme-color" content="#000000">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap">
<title>CYBER.ISLAND</title>
<style>

:root {
  --blk: #000;
  --cyn: #00ffe5;
  --mag: #ff1a4b;
  --gold: #ffaa00;
  --wht: #e0e8f0;
  --dim: #0a0e14;
  --safe-top: env(safe-area-inset-top, 54px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height:100%; overflow:hidden; background:#000; }

body {
  width:100vw; height:100vh; height:100dvh;
  background: #000;
  overflow:hidden; position:fixed; inset:0;
  font-family:'Share Tech Mono','Courier New',monospace;
  touch-action:none;
  -webkit-user-select:none; user-select:none;
}

/* ── FILM GRAIN ── */
.grain {
  position:fixed; inset:0; z-index:950; pointer-events:none;
  opacity:0.055;
  animation: grain-shift 0.12s steps(1) infinite;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}
@keyframes grain-shift {
  0%  { background-position: 0 0; }
  10% { background-position: -5% -10%; }
  20% { background-position: -15% 5%; }
  30% { background-position: 7% -25%; }
  40% { background-position: -5% 25%; }
  50% { background-position: -15% 10%; }
  60% { background-position: 15% 0%; }
  70% { background-position: 0 15%; }
  80% { background-position: 3% 35%; }
  90% { background-position: -10% 10%; }
  100%{ background-position: 0 0; }
}

/* ── CINEMATIC LETTERBOX ── */
.letterbox-top, .letterbox-bot {
  position:fixed; left:0; right:0; z-index:940; pointer-events:none;
  height: 52px;
  background: #000;
}
.letterbox-top { top:0; }
.letterbox-bot { bottom:0; }

/* ── VIGNETTE ── */
.vignette {
  position:fixed; inset:0; z-index:920; pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.92) 100%);
}

/* ── CHROMATIC ABERRATION OVERLAY ── */
.chroma {
  position:fixed; inset:0; z-index:910; pointer-events:none; mix-blend-mode:screen; opacity:0.03;
  background: linear-gradient(90deg, rgba(255,0,60,0.5) 0%, transparent 3%, transparent 97%, rgba(0,255,229,0.5) 100%);
}

/* ── SCANLINES ── */
.scanlines {
  position:fixed; inset:0; z-index:905; pointer-events:none; opacity:0.07;
  background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0,0,0,1) 1px, rgba(0,0,0,1) 2px);
}

/* ── GLITCH BARS ── */
.glitch-bar {
  position:fixed; left:0; right:0; height:1px; pointer-events:none; z-index:900; opacity:0;
  animation: glitch-sweep 9s ease-in-out infinite;
}
.glitch-bar:nth-child(1){ background: linear-gradient(90deg,transparent,var(--cyn),transparent); animation-delay:0s; }
.glitch-bar:nth-child(2){ background: linear-gradient(90deg,transparent,var(--mag),transparent); animation-delay:3.3s; }
.glitch-bar:nth-child(3){ background: linear-gradient(90deg,transparent,var(--wht),transparent); animation-delay:6.6s; height:2px; }
@keyframes glitch-sweep {
  0%  { top:-2px; opacity:0; }
  3%  { opacity:0.9; }
  97% { opacity:0.4; }
  100%{ top:101vh; opacity:0; }
}

/* ── AMBIENT LIGHT ── */
.ambient {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background: radial-gradient(ellipse 60% 40% at 50% 100%, rgba(0,255,229,0.04) 0%, transparent 70%),
              radial-gradient(ellipse 40% 30% at 20% 60%, rgba(255,26,75,0.03) 0%, transparent 70%);
}

/* ── CANVASES ── */
#rain  { position:fixed; inset:0; z-index:2; pointer-events:none; }
#city  { position:fixed; bottom:52px; left:0; right:0; z-index:3; pointer-events:none; }

/* ── TOP HUD ── */
.hud-top {
  position:fixed; top:0; left:0; right:0; z-index:961;
  padding-top: calc(var(--safe-top) + 2px);
  padding-left:20px; padding-right:20px;
  display:flex; justify-content:space-between; align-items:flex-end;
  height: calc(var(--safe-top) + 32px);
  pointer-events:none;
  border-bottom: 1px solid rgba(0,255,229,0.06);
}
.hud-txt {
  font-family:'Share Tech Mono','Courier New',monospace; font-size:9px;
  color: rgba(0,255,229,0.5); letter-spacing:0.2em; line-height:1;
}
.hud-txt .a { color:var(--mag); }
.hud-txt .b { color:var(--gold); }

/* ── ISLAND ── */
.island-wrap {
  position:fixed;
  top: var(--safe-top);
  left:50%; transform:translate(-50%, 10px);
  z-index:960;
}

.island {
  width:126px; height:37px;
  background:#000;
  border-radius:22px;
  border:1px solid rgba(0,255,229,0.7);
  position:relative; overflow:hidden;
  transition:
    width  0.4s cubic-bezier(.34,1.4,.64,1),
    height 0.4s cubic-bezier(.34,1.4,.64,1),
    border-radius 0.4s ease,
    border-color 0.4s ease,
    box-shadow 0.4s ease;
  cursor:pointer;
  box-shadow:
    0 0 0 1px rgba(0,255,229,0.1),
    0 0 16px rgba(0,255,229,0.4),
    0 0 40px rgba(0,255,229,0.12),
    0 2px 60px rgba(0,0,0,0.9),
    inset 0 0 12px rgba(0,255,229,0.03);
}

/* inner vignette on island */
.island::after {
  content:''; position:absolute; inset:0; z-index:98; pointer-events:none;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
}

.island.ex-sm { width:172px; height:52px; }
.island.ex-md {
  width: min(320px, 90vw); height:108px; border-radius:32px;
  border-color: rgba(0,255,229,0.6);
  box-shadow: 0 0 0 1px rgba(0,255,229,0.08),
    0 0 24px rgba(0,255,229,0.5), 0 0 80px rgba(0,255,229,0.15),
    0 4px 80px rgba(0,0,0,0.95), inset 0 0 20px rgba(0,255,229,0.04);
}
.island.ex-lg {
  width: min(340px, 94vw); height:152px; border-radius:36px;
  border-color: rgba(255,26,75,0.7);
  box-shadow: 0 0 0 1px rgba(255,26,75,0.1),
    0 0 24px rgba(255,26,75,0.55), 0 0 80px rgba(255,26,75,0.18),
    0 4px 80px rgba(0,0,0,0.95), inset 0 0 20px rgba(255,26,75,0.04);
}

/* ── SCENES ── */
.scene {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity 0.3s ease; pointer-events:none;
}
.scene.active { opacity:1; }
.scene svg { image-rendering:pixelated; }

/* ── SIDE HUD ── */
.side-r, .side-l {
  position:fixed; top:50%; transform:translateY(-50%);
  z-index:955; pointer-events:none;
  display:flex; flex-direction:column; gap:18px;
}
.side-r { right:14px; align-items:flex-end; }
.side-l { left:14px; }

.hud-item { font-size:8px; color:rgba(0,255,229,0.35); letter-spacing:0.15em; line-height:2; }
.hud-item strong { display:block; font-size:10px; color:var(--cyn); opacity:0.8; }
.hud-item .r { color:var(--mag); }
.hud-item .g { color:#39ff14; }
.bar { width:36px; height:2px; background:rgba(0,255,229,0.1); margin-top:3px; }
.bar-f { height:100%; background:var(--cyn); transition:width 1.2s; }
.bar-f.r { background:var(--mag); }

/* ── BOTTOM HUD ── */
.hud-bot {
  position:fixed; bottom:0; left:0; right:0;
  padding-bottom:calc(var(--safe-bot) + 4px);
  z-index:962;
  display:flex; flex-direction:column; align-items:center; gap:10px;
  pointer-events:all;
}

.dots { display:flex; gap:6px; align-items:center; }
.dot {
  width:5px; height:5px; border-radius:50%;
  background:rgba(0,255,229,0.15); border:1px solid rgba(0,255,229,0.2);
  transition:all 0.4s;
}
.dot.on { background:var(--cyn); box-shadow:0 0 6px var(--cyn); border-color:var(--cyn); }
.dot.on.r { background:var(--mag); box-shadow:0 0 6px var(--mag); border-color:var(--mag); }

.controls { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; padding:0 12px; }
.btn {
  padding:8px 14px; min-width:66px; text-align:center;
  background:rgba(0,0,0,0.8);
  border:1px solid rgba(0,255,229,0.4);
  color:rgba(0,255,229,0.7);
  font-family:'Share Tech Mono','Courier New',monospace; font-size:10px;
  letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
  transition:all 0.18s;
  -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
  position:relative; overflow:hidden;
}
.btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(0,255,229,0.05) 0%, transparent 100%);
  pointer-events:none;
}
.btn:active,.btn.active {
  background:rgba(0,255,229,0.12);
  border-color:var(--cyn); color:var(--cyn);
  box-shadow:0 0 12px rgba(0,255,229,0.3);
}
.btn.r { border-color:rgba(255,26,75,0.4); color:rgba(255,26,75,0.7); }
.btn.r:active,.btn.r.active { background:rgba(255,26,75,0.12); border-color:var(--mag); color:var(--mag); box-shadow:0 0 12px rgba(255,26,75,0.3); }

.label-hud { font-size:8px; color:rgba(0,255,229,0.2); letter-spacing:0.28em; text-transform:uppercase; }

/* ── ANIMS ── */
@keyframes px-blink { 0%,84%,100%{transform:scaleY(1)} 88%{transform:scaleY(0.05)} }
@keyframes neon-flk { 0%,17%,19%,23%,54%,56%,100%{opacity:1} 18%,22%,55%{opacity:0.2} }
@keyframes blink { 50%{opacity:0} }
@keyframes scan-sweep {
  0%{transform:translateY(-4px);opacity:0} 6%{opacity:1} 94%{opacity:0.5} 100%{transform:translateY(160px);opacity:0}
}
@keyframes pulse-out {
  0%{r:5;opacity:1;stroke-width:2.5}
  100%{r:44;opacity:0;stroke-width:0.3}
}
@keyframes float-y {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
}
@keyframes ember {
  0%{transform:translateY(0) scale(1);opacity:1}
  100%{transform:translateY(-20px) scale(0.3);opacity:0}
}
</style>
</head>
<body>

<!-- Layers -->
<div class="grain"></div>
<div class="letterbox-top"></div>
<div class="letterbox-bot"></div>
<div class="vignette"></div>
<div class="chroma"></div>
<div class="scanlines"></div>
<div class="ambient"></div>
<div class="glitch-bar"></div>
<div class="glitch-bar"></div>
<div class="glitch-bar"></div>

<canvas id="rain"></canvas>
<canvas id="city"></canvas>


<!-- TOP HUD -->
<div class="hud-top">
  <div class="hud-txt">SYS:<span class="a">GHOST.EXE</span></div>
  <div class="hud-txt" id="clock" style="letter-spacing:0.3em;color:rgba(0,255,229,0.6)">--:--:--</div>
  <div class="hud-txt"><span class="b" style="animation:blink 1.1s step-end infinite">◆</span> <span class="a">REC</span></div>
</div>

<!-- DYNAMIC ISLAND -->
<div class="island-wrap">
  <div class="island" id="island">

    <!-- ══ S0: RONIN ══ -->
    <div class="scene active" id="s0">
      <svg viewBox="0 0 126 37" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
        <!-- Atmospheric depth gradient -->
        <defs>
          <radialGradient id="faceglow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00ffe5" stop-opacity="0.08"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="armorgrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1a2a3a"/>
            <stop offset="100%" stop-color="#050e14"/>
          </linearGradient>
        </defs>
        <rect width="126" height="37" fill="#000"/>
        <!-- Ambient glow behind face -->
        <ellipse cx="63" cy="16" rx="28" ry="16" fill="url(#faceglow)"/>
        <!-- Hair silhouette -->
        <rect x="44" y="1"  width="24" height="5"  fill="#c8d0d8"/>
        <rect x="42" y="4"  width="5"  height="15" fill="#c8d0d8"/>
        <rect x="79" y="4"  width="5"  height="15" fill="#c8d0d8"/>
        <rect x="44" y="4"  width="3"  height="15" fill="#a8b0b8"/>
        <!-- Face - layered shading -->
        <rect x="47" y="6"  width="32" height="18" fill="#d4c4a8"/>
        <rect x="47" y="6"  width="32" height="6"  fill="#b8a88c"/>
        <rect x="47" y="20" width="32" height="4"  fill="#c0b090"/>
        <!-- Cheek shadow -->
        <rect x="47" y="10" width="6"  height="10" fill="#c0a880" opacity="0.5"/>
        <rect x="73" y="10" width="6"  height="10" fill="#c0a880" opacity="0.5"/>
        <!-- Eyes -->
        <g style="animation:px-blink 3.5s ease-in-out infinite;transform-origin:55px 14px">
          <rect x="51" y="11" width="8"  height="7"  fill="#1a0a00"/>
          <rect x="52" y="12" width="6"  height="5"  fill="#00ffe5"/>
          <rect x="53" y="12" width="3"  height="3"  fill="#003830"/>
          <rect x="55" y="13" width="2"  height="2"  fill="#00ffe5" style="animation:neon-flk 2s infinite"/>
          <rect x="54" y="11" width="5"  height="1"  fill="#1a0a00"/><!-- lash -->
        </g>
        <g style="animation:px-blink 3.5s ease-in-out infinite 0.1s;transform-origin:71px 14px">
          <rect x="67" y="11" width="8"  height="7"  fill="#1a0a00"/>
          <rect x="68" y="12" width="6"  height="5"  fill="#00ffe5"/>
          <rect x="69" y="12" width="3"  height="3"  fill="#003830"/>
          <rect x="71" y="13" width="2"  height="2"  fill="#00ffe5" style="animation:neon-flk 2s infinite 0.3s"/>
          <rect x="68" y="11" width="5"  height="1"  fill="#1a0a00"/>
        </g>
        <!-- Nose bridge shadow -->
        <rect x="61" y="15" width="4" height="5" fill="#b89878" opacity="0.4"/>
        <!-- Mouth -->
        <rect x="55" y="21" width="16" height="2" fill="#8a5040"/>
        <rect x="57" y="21" width="12" height="1" fill="#6a3028"/>
        <!-- Scar -->
        <rect x="68" y="9"  width="1"  height="8"  fill="#ff1a4b" opacity="0.6"/>
        <!-- Face paint / war marks -->
        <rect x="48" y="12" width="4"  height="1"  fill="#ff1a4b" opacity="0.8"/>
        <rect x="74" y="12" width="4"  height="1"  fill="#ff1a4b" opacity="0.8"/>
        <!-- Armor body -->
        <rect x="36" y="24" width="54" height="13" fill="url(#armorgrad)"/>
        <rect x="36" y="24" width="54" height="1"  fill="#00ffe5" opacity="0.4"/>
        <!-- Armor plates -->
        <rect x="36" y="25" width="18" height="12" fill="#0a1820"/>
        <rect x="55" y="25" width="16" height="12" fill="#050e14"/>
        <rect x="72" y="25" width="18" height="12" fill="#0a1820"/>
        <!-- Plate dividers neon -->
        <rect x="54" y="25" width="1"  height="12" fill="#00ffe5" opacity="0.3"/>
        <rect x="71" y="25" width="1"  height="12" fill="#00ffe5" opacity="0.3"/>
        <!-- Armor details -->
        <rect x="38" y="28" width="12" height="1"  fill="#00ffe5" opacity="0.5"/>
        <rect x="74" y="28" width="12" height="1"  fill="#00ffe5" opacity="0.5"/>
        <rect x="58" y="27" width="10" height="1"  fill="#ff1a4b" opacity="0.6"/>
        <!-- Katana blade -->
        <rect x="88" y="1"  width="2"  height="28" fill="#c8d8e0"/>
        <rect x="89" y="1"  width="1"  height="28" fill="#e8f0f8" opacity="0.6"/>
        <rect x="87" y="1"  width="1"  height="28" fill="#80909a" opacity="0.5"/>
        <!-- Blade glow -->
        <rect x="88" y="1"  width="2"  height="8"  fill="#00ffe5" opacity="0.5" style="animation:neon-flk 1.8s infinite"/>
        <!-- Guard -->
        <rect x="84" y="16" width="10" height="3"  fill="#4a5a6a"/>
        <rect x="85" y="16" width="8"  height="1"  fill="#8a9aaa"/>
        <!-- Handle -->
        <rect x="87" y="19" width="4"  height="10" fill="#2a1a0a"/>
        <rect x="87" y="20" width="4"  height="1"  fill="#8a6a40" opacity="0.6"/>
        <rect x="87" y="22" width="4"  height="1"  fill="#8a6a40" opacity="0.6"/>
        <rect x="87" y="24" width="4"  height="1"  fill="#8a6a40" opacity="0.6"/>
        <!-- HP / MP bars cinematic -->
        <text x="3" y="10" font-family="monospace" font-size="4" fill="#00ffe5" opacity="0.5" letter-spacing="0.05em">RONIN</text>
        <rect x="3" y="12" width="30" height="3"  fill="#000" stroke="#00ffe5" stroke-width="0.5"/>
        <rect x="4" y="13" width="26" height="1"  fill="#00ffe5" opacity="0.8"/>
        <rect x="4" y="13" width="26" height="1"  fill="#00ffe5" opacity="0.3" style="animation:neon-flk 1.5s infinite"/>
        <text x="3" y="21" font-family="monospace" font-size="4" fill="#ff1a4b" opacity="0.5" letter-spacing="0.05em">FOCUS</text>
        <rect x="3" y="23" width="30" height="3"  fill="#000" stroke="#ff1a4b" stroke-width="0.5"/>
        <rect x="4" y="24" width="18" height="1"  fill="#ff1a4b" opacity="0.8"/>
        <!-- Corner frame marks -->
        <rect x="0"  y="0"  width="4" height="1" fill="#00ffe5" opacity="0.4"/>
        <rect x="0"  y="0"  width="1" height="4" fill="#00ffe5" opacity="0.4"/>
        <rect x="122" y="0"  width="4" height="1" fill="#00ffe5" opacity="0.4"/>
        <rect x="125" y="0"  width="1" height="4" fill="#00ffe5" opacity="0.4"/>
      </svg>
    </div>

    <!-- ══ S1: NEURAL HACK ══ -->
    <div class="scene" id="s1">
      <svg viewBox="0 0 320 108" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
        <defs>
          <radialGradient id="eyeglow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#00ffe5" stop-opacity="0.3"/>
            <stop offset="60%" stop-color="#00ffe5" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="320" height="108" fill="#000"/>
        <!-- Grid lines subtle -->
        <line x1="0" y1="27" x2="320" y2="27" stroke="#00ffe5" stroke-width="0.3" opacity="0.1"/>
        <line x1="0" y1="54" x2="320" y2="54" stroke="#00ffe5" stroke-width="0.3" opacity="0.1"/>
        <line x1="0" y1="81" x2="320" y2="81" stroke="#00ffe5" stroke-width="0.3" opacity="0.1"/>
        <!-- Scan beam -->
        <rect x="0" y="0" width="320" height="2" fill="#00ffe5" opacity="0.5"
          style="animation:scan-sweep 1.8s linear infinite"/>
        <!-- Terminal text with varying opacity for depth -->
        <text x="6" y="14" font-family="monospace" font-size="6.5" fill="#00ffe5" opacity="0.8" letter-spacing="0.05em">SYS::NEURAL_LINK_INIT_v9.0.1</text>
        <text x="6" y="24" font-family="monospace" font-size="6"   fill="#39ff14" opacity="0.65">▸ ACCESS_GRANTED [GHOST_PROTOCOL]</text>
        <text x="6" y="33" font-family="monospace" font-size="6"   fill="#00ffe5" opacity="0.45">  PING 127.0.0.1 .............. OK</text>
        <text x="6" y="42" font-family="monospace" font-size="6"   fill="#ff1a4b" opacity="0.8">⚠ INTRUSION_DETECTED SECTOR_7</text>
        <text x="6" y="51" font-family="monospace" font-size="6"   fill="#00ffe5" opacity="0.35">  ENCRYPT AES-∞ BIT ...........</text>
        <text x="6" y="60" font-family="monospace" font-size="6"   fill="#ffaa00" opacity="0.6">◈ DECRYPTING NEURAL_CORE.......</text>
        <text x="6" y="86" font-family="monospace" font-size="5"   fill="#00ffe5" opacity="0.25" id="hx1">A4 F2 09 CC 3B E1 78 2D 55 91..</text>

  <div class="label-hud">// CYBER.ISLAND // TAP TO CYCLE //</div>
</div>

<script>
(function CYBER_ISLAND() {
  'use strict';

  // ── Safe RAF wrapper: each loop is isolated, never kills siblings ──
  function safeLoop(fn) {
    function tick() {
      try { fn(); } catch(e) { console.warn('[CYBER] loop err:', e.message); }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  // ── Safe element getter ──
  function el(id) { return document.getElementById(id); }

  // ── Wait for DOM ──
  function init() {

    // ── CLOCK ──
    try {
      const clk = () => {
        const n = new Date();
        const e = el('clock');
        if (e) e.textContent = [n.getHours(), n.getMinutes(), n.getSeconds()]
          .map(v => String(v).padStart(2, '0')).join(':');
      };
      clk();
      setInterval(clk, 1000);
    } catch(e) { console.warn('[CYBER] clock:', e.message); }

    // ── RAIN CANVAS ──
    try {
      const rainEl = el('rain');
      if (!rainEl) throw new Error('rain canvas missing');
      const rx = rainEl.getContext('2d');

      const resize = () => {
        rainEl.width  = window.innerWidth;
        rainEl.height = window.innerHeight;
      };
      resize();
      window.addEventListener('resize', resize);

      const drops = Array.from({ length: 120 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        s: Math.random() * 4 + 2,
        l: Math.random() * 18 + 6,
        c: Math.random() > 0.6 ? '#00ffe5' : Math.random() > 0.5 ? '#ff1a4b' : '#ffaa00',
        o: Math.random() * 0.35 + 0.15
      }));

      safeLoop(() => {
        rx.clearRect(0, 0, rainEl.width, rainEl.height);
        drops.forEach(d => {
          rx.save();
          rx.strokeStyle = d.c;
          rx.lineWidth   = 0.8;
          rx.globalAlpha = d.o;
          rx.beginPath();
          rx.moveTo(d.x, d.y);
          rx.lineTo(d.x - 1, d.y + d.l);
          rx.stroke();
          rx.restore();
          d.y += d.s;
          if (d.y > rainEl.height) { d.y = -d.l; d.x = Math.random() * rainEl.width; }
        });
      });
    } catch(e) { console.warn('[CYBER] rain:', e.message); }

    // ── CITY CANVAS ──
    try {
      const cityEl = el('city');
      if (!cityEl) throw new Error('city canvas missing');
      const ctx = cityEl.getContext('2d');

      const cityH = () => Math.floor(window.innerHeight * 0.42);
      const resizeCity = () => {
        cityEl.width  = window.innerWidth;
        cityEl.height = cityH();
      };
      resizeCity();
      window.addEventListener('resize', resizeCity);

      // Generate buildings after canvas is sized
      const mkBuildings = () => Array.from({ length: 30 }, () => ({
        x:    Math.random() * window.innerWidth * 2,
        w:    Math.floor(Math.random() * 36 + 12),
        h:    Math.floor(Math.random() * cityEl.height * 0.8 + cityEl.height * 0.15),
        c:    Math.random() > 0.5 ? '#00ffe5' : '#ff1a4b',
        wins: Array.from({ length: 16 }, () => ({
          ox: Math.floor(Math.random() * 4) * 8 + 4,
          oy: Math.floor(Math.random() * 6) * 12 + 6,
          on: Math.random() > 0.3
        }))
      }));

      let buildings = mkBuildings();
      window.addEventListener('resize', () => { buildings = mkBuildings(); });

      let offset = 0;
      safeLoop(() => {
        const W = cityEl.width, H = cityEl.height;
        ctx.clearRect(0, 0, W, H);
        offset = (offset + 0.35) % W;

        buildings.forEach(b => {
          const x = ((b.x - offset % W + W * 2) % (W * 2)) - 60;
          if (x > W + 60) return; // cull off-screen

          // Building fill
          ctx.fillStyle   = b.c;
          ctx.globalAlpha = 0.05;
          ctx.fillRect(x, H - b.h, b.w, b.h);

          // Building outline
          ctx.strokeStyle = b.c;
          ctx.globalAlpha = 0.14;
          ctx.lineWidth   = 0.6;
          ctx.strokeRect(x, H - b.h, b.w, b.h);

          // Windows
          b.wins.forEach(w => {
            if (!w.on) return;
            ctx.globalAlpha = 0.3 + Math.random() * 0.3;
            ctx.fillStyle   = b.c;
            ctx.fillRect(x + w.ox, H - b.h + w.oy, 2, 2);
          });

          // Antenna on tall buildings
          if (b.h > H * 0.55) {
            ctx.globalAlpha = 0.45;
            ctx.strokeStyle = b.c;
            ctx.lineWidth   = 0.5;
            ctx.beginPath();
            ctx.moveTo(x + b.w / 2, H - b.h);
            ctx.lineTo(x + b.w / 2, H - b.h - 10);
            ctx.stroke();
            ctx.fillStyle   = b.c;
            ctx.globalAlpha = 0.85;
            ctx.fillRect(x + b.w / 2 - 1, H - b.h - 12, 2, 2);
          }
        });

        // Ground glow
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = '#00ffe5';
        ctx.lineWidth   = 1;
        ctx.beginPath(); ctx.moveTo(0, H - 1); ctx.lineTo(W, H - 1); ctx.stroke();
        ctx.globalAlpha = 1;
      });
    } catch(e) { console.warn('[CYBER] city:', e.message); }

    // ── HEX SCRAMBLE ──
    try {
      const HX = '0123456789ABCDEF';
      const rh  = n => Array.from({ length: n }, () => HX[~~(Math.random() * 16)]).join('');
      setInterval(() => {
        ['hx1', 'hx2', 'hx3'].forEach(id => {
          const e = el(id);
          if (e) e.textContent = Array.from({ length: 14 }, () => rh(2)).join(' ') + '...';
        });
      }, 160);
    } catch(e) { console.warn('[CYBER] hex:', e.message); }

    // ── HUD FLICKER ──
    try {
      setInterval(() => {
        const set = (id, val, unit) => {
          const e = el(id); if (e) e.textContent = val.toFixed(1) + unit;
        };
        const setW = (id, pct) => {
          const e = el(id); if (e) e.style.width = Math.min(100, pct) + '%';
        };
        const n = 88 + Math.random() * 11;
        const c = 35 + Math.random() * 60;
        const t = 38 + Math.random() * 18;
        set('net-v', n, '%'); setW('net-b', n);
        set('cpu-v', c, '%'); setW('cpu-b', c);
        const tv = el('tmp-v'); if (tv) tv.textContent = t.toFixed(0) + '°C';
      }, 950);
    } catch(e) { console.warn('[CYBER] hud:', e.message); }

    // ── SCENE CONTROL ──
    try {
      const MODES  = ['RONIN', 'NEURAL', 'GHOST', 'WYRM'];
      const EXPAND = [null, 'ex-md', 'ex-lg', 'ex-lg'];
      const IS_MAG = [false, false, false, true];
      const island = el('island');
      if (!island) throw new Error('island element missing');

      let cur = 0, autoTimer = null;

      function go(i, keep) {
        if (!keep && autoTimer) {
          clearInterval(autoTimer);
          autoTimer = null;
          const ab = el('abtn'); if (ab) ab.classList.remove('active');
        }

        // Toggle scenes
        ['s0','s1','s2','s3'].forEach((id, j) => {
          const s = el(id); if (s) s.classList.toggle('active', j === i);
        });

        // Island size
        island.classList.remove('ex-sm', 'ex-md', 'ex-lg');
        if (EXPAND[i]) island.classList.add(EXPAND[i]);

        // Dots
        for (let j = 0; j < 4; j++) {
          const d = el('d' + j); if (!d) continue;
          const on = j === i;
          d.classList.toggle('on', on);
          d.classList.toggle('r', on && IS_MAG[j]);
          if (!on) {
            d.style.background  = 'rgba(0,255,229,0.15)';
            d.style.boxShadow   = 'none';
          } else if (IS_MAG[j]) {
            d.style.background  = '#ff1a4b';
            d.style.boxShadow   = '0 0 6px #ff1a4b';
          } else {
            d.style.background  = '#00ffe5';
            d.style.boxShadow   = '0 0 6px #00ffe5';
          }
        }

        // Buttons
        document.querySelectorAll('.btn').forEach((b, j) => {
          if (j < 4) b.classList.toggle('active', j === i);
        });

        // Mode label
        const mv = el('mode-v'); if (mv) mv.textContent = MODES[i];
        cur = i;
      }

      window.autoPlay = function() {
        const ab = el('abtn'); if (!ab) return;
        if (autoTimer) {
          clearInterval(autoTimer);
          autoTimer = null;
          ab.classList.remove('active');
          return;
        }
        ab.classList.add('active');
        go((cur + 1) % 4, true);
        autoTimer = setInterval(() => go((cur + 1) % 4, true), 3400);
      };

      // Make go() globally accessible for inline onclick
      window.go = go;

      island.addEventListener('click', () => {
        if (autoTimer) {
          clearInterval(autoTimer);
          autoTimer = null;
          const ab = el('abtn'); if (ab) ab.classList.remove('active');
        }
        go((cur + 1) % 4);
        island.style.filter = 'brightness(1.6)';
        setTimeout(() => { island.style.filter = ''; }, 130);
      });

      island.addEventListener('touchstart', e => {
        e.preventDefault();
        island.dispatchEvent(new MouseEvent('click'));
      }, { passive: false });

      go(0);

    } catch(e) { console.warn('[CYBER] scene ctrl:', e.message); }

  } // end init()

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
